{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGM Revizto Report</title>

    <!-- Include Tailwind CSS via CDN (Play CDN for development) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Include Date picker dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.5/datepicker.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- Toast System CSS -->
    <link rel="stylesheet" href="{% static 'css/toast.css' %}">

    <!-- Additional styles for fixed navbar -->
    <style>
        body {
            padding-top: 4rem; /* Adjust this value based on your navbar height */
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <!-- Add CSRF Token -->
    {% csrf_token %}

    <!-- Toast Container (will be created dynamically by JavaScript) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Navigation Bar -->
    {% include "navbar.html" %}

    <!-- Main Content Area -->
    {% include "main.html" %}

    <!-- Footer -->
    {% include "footer.html" %}

    <!-- Toast System JavaScript (load first) -->
    <script src="{% static 'js/toast.js' %}"></script>

    <!-- JavaScript - Use SIMPLIFIED versions to avoid DOM manipulation errors -->
    <script src="{% static 'js/main.js' %}"></script>

    <!-- Use simplified project form and PDF generator -->
    <script>
        // Check if we should use simplified versions
        const useSimplified = true; // Set to true to avoid DOM manipulation errors

        if (useSimplified) {
            console.log('[DEBUG] Loading simplified versions to avoid DOM errors');
        }
    </script>

    <!-- Load simplified versions or original based on flag -->
    <script src="{% static 'js/simple-project-form.js' %}"></script>
    <script src="{% static 'js/simple-pdf-generator.js' %}"></script>
    <script src="{% static 'js/search.js' %}"></script>

    <!-- Then load the main issue-data.js -->
    <script src="{% static 'js/issue-data.js' %}"></script>

    <!-- Additional scripts -->
    <script src="{% static 'js/datepicker.js' %}"></script>

    <!-- Toast System Demo and Initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[INDEX-DEBUG] DOM loaded in index.html');

            // Initialize toast system
            if (window.Toast) {
                console.log('[INDEX-DEBUG] Toast system initialized');

                // Show welcome toast
                setTimeout(() => {
                    Toast.info(
                        'Système STGM',
                        'Application de rapport Revizto chargée avec succès',
                        { duration: 3000 }
                    );
                }, 500);
            } else {
                console.error('[INDEX-DEBUG] Toast system not available');
            }

            // Check if issue data handler is available
            if (window.issueDataHandler) {
                console.log('[INDEX-DEBUG] issueDataHandler is available');
            } else {
                console.error('[INDEX-DEBUG] issueDataHandler is NOT available');
            }

            // Check for active project and status map
            setTimeout(function() {
                console.log('[INDEX-DEBUG] Current activeProjectId:', window.activeProjectId);

                // Log status map state
                if (window.statusMap) {
                    console.log('[INDEX-DEBUG] statusMap has', Object.keys(window.statusMap).length, 'entries');

                    // Check for "En attente" status
                    let foundEnAttente = false;
                    for (const [key, status] of Object.entries(window.statusMap)) {
                        if (status.name === "En attente" || status.displayName === "En attente") {
                            console.log('[INDEX-DEBUG] "En attente" status found with key:', key);
                            foundEnAttente = true;
                            break;
                        }
                    }

                    if (!foundEnAttente) {
                        console.log('[INDEX-DEBUG] "En attente" status NOT found in statusMap');
                    }
                } else {
                    console.log('[INDEX-DEBUG] statusMap is not defined');
                }

                // Check direct map
                if (window.statusDirectMap) {
                    console.log('[INDEX-DEBUG] statusDirectMap has', Object.keys(window.statusDirectMap).length, 'entries');
                }
            }, 2000);

            // Add keyboard shortcuts for development/testing
            document.addEventListener('keydown', function(event) {
                // Ctrl+Shift+T for test toasts (development only)
                if (event.ctrlKey && event.shiftKey && event.key === 'T') {
                    event.preventDefault();
                    showTestToasts();
                }
            });
        });

        // Test function for toast notifications (development/demo purposes)
        function showTestToasts() {
            console.log('[TOAST-TEST] Showing test toasts...');

            setTimeout(() => Toast.success('Test Succès', 'Ceci est un test de notification de succès'), 0);
            setTimeout(() => Toast.error('Test Erreur', 'Ceci est un test de notification d\'erreur'), 1000);
            setTimeout(() => Toast.warning('Test Attention', 'Ceci est un test de notification d\'attention'), 2000);
            setTimeout(() => Toast.info('Test Info', 'Ceci est un test de notification d\'information'), 3000);

            const loadingId = Toast.loading('Test Chargement', 'Ceci est un test de notification de chargement');
            setTimeout(() => {
                Toast.update(loadingId, {
                    type: 'success',
                    title: 'Chargement terminé',
                    message: 'Le test de chargement a été converti en succès',
                    duration: 3000
                });
            }, 4000);
        }

        // Global error handler to show toast notifications for uncaught errors
        window.addEventListener('error', function(event) {
            console.error('[GLOBAL-ERROR]', event.error);

            if (window.Toast) {
                Toast.error(
                    'Erreur système',
                    'Une erreur inattendue s\'est produite. Consultez la console pour plus de détails.',
                    { duration: 8000 }
                );
            }
        });

        // Global promise rejection handler
        window.addEventListener('unhandledrejection', function(event) {
            console.error('[UNHANDLED-PROMISE-REJECTION]', event.reason);

            if (window.Toast) {
                Toast.error(
                    'Erreur de promesse',
                    'Une promesse JavaScript a été rejetée sans gestionnaire d\'erreur.',
                    { duration: 6000 }
                );
            }
        });
    </script>
</body>
</html>
